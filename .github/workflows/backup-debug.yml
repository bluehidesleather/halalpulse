name: HalalPulse backup diagnostics

"on":
  push:
    branches:
      - "agent/release-candidate-completion"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: halalpulse_test
          MYSQL_USER: halalpulse
          MYSQL_PASSWORD: halalpulse_ci
          MYSQL_ROOT_PASSWORD: root_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, curl, json, mbstring, bcmath, dom, openssl
          coverage: none
      - name: Prepare database and private configuration
        env:
          MYSQL_PWD: halalpulse_ci
        run: |
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/schema.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/migrations/010_nse_activity_exclusions.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/migrations/011_sharia_xbrl_candidates.sql
          mkdir -p storage/logs storage/documents storage/xbrl storage/backups
          php -r '
            $config = require "config/config.example.php";
            $config["app"]["environment"] = "testing";
            $config["app"]["log_path"] = getcwd() . "/storage/logs/halalpulse.jsonl";
            $config["security"]["app_key"] = str_repeat("c", 64);
            $config["database"]["host"] = "127.0.0.1";
            $config["database"]["name"] = "halalpulse_test";
            $config["database"]["user"] = "halalpulse";
            $config["database"]["password"] = "halalpulse_ci";
            $config["documents"]["storage_path"] = getcwd() . "/storage/documents";
            $config["sources"]["nse_integrated_rss"]["storage_path"] = getcwd() . "/storage/xbrl";
            $config["backups"]["enabled"] = true;
            $config["backups"]["storage_path"] = getcwd() . "/storage/backups";
            $config["backups"]["encryption_passphrase"] = "ci-only-backup-passphrase-with-sufficient-length";
            $config["backups"]["mysqldump_binary"] = "/usr/bin/mysqldump";
            $config["backups"]["tar_binary"] = "/usr/bin/tar";
            file_put_contents("config/config.local.php", "<?php\n\ndeclare(strict_types=1);\n\nreturn " . var_export($config, true) . ";\n");
          '
          chmod 600 config/config.local.php
      - name: Run focused backup lifecycle
        run: |
          set -o pipefail
          php cron/create-backup.php
          php cron/check-backups.php --decrypt
          backup_path="$(php -r '$c=require "config/config.local.php";$s=json_decode((string)file_get_contents($c["backups"]["storage_path"]."/latest.json"),true,512,JSON_THROW_ON_ERROR);echo $s["path"];')"
          rm -rf /tmp/halalpulse-restore-test
          php cron/extract-backup.php "$backup_path" /tmp/halalpulse-restore-test --confirm-isolated-extraction
          gzip -t /tmp/halalpulse-restore-test/database.sql.gz
          tar -tzf /tmp/halalpulse-restore-test/private-files.tar.gz >/dev/null
