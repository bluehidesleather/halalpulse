name: HalalPulse CI

"on":
  pull_request:
  push:
    branches:
      - "main"
      - "agent/**"

permissions:
  contents: read

concurrency:
  group: halalpulse-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: PHP 8.3 and MySQL 8 validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: halalpulse_test
          MYSQL_USER: halalpulse
          MYSQL_PASSWORD: halalpulse_ci
          MYSQL_ROOT_PASSWORD: root_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, curl, json, mbstring, bcmath, dom, openssl
          coverage: none

      - name: Verify required PHP extensions
        run: |
          php -r '
            $required = ["pdo_mysql", "curl", "json", "mbstring", "bcmath", "dom", "openssl"];
            $missing = array_values(array_filter($required, static fn (string $extension): bool => !extension_loaded($extension)));
            if ($missing !== []) {
                fwrite(STDERR, "Missing PHP extensions: " . implode(", ", $missing) . PHP_EOL);
                exit(1);
            }
            if (!in_array("aes-256-gcm", array_map("strtolower", openssl_get_cipher_methods()), true)) {
                fwrite(STDERR, "AES-256-GCM is unavailable." . PHP_EOL);
                exit(1);
            }
          '

      - name: Lint PHP files
        run: find . -type f -name '*.php' -print0 | sort -z | xargs -0 -n1 php -l

      - name: Run dependency-free test suites
        run: |
          php tests/run.php
          php tests/screening-ranking.php
          php tests/sharia-policy-readiness.php
          php tests/sharia-evidence-readiness.php
          php tests/multibagger-methodology-readiness.php
          php tests/multibagger-evidence-readiness.php
          php tests/backup-encryption.php
          php tests/operations-readiness.php
          php tests/repository-safety.php
          php tests/session-security.php
          php tests/http-request-security.php
          php tests/official-url-security.php
          php tests/telegram-security.php

      - name: Verify NSE prohibited-activity exclusion rule
        run: |
          php -r '
            require "app/bootstrap.php";
            $banking = \HalalPulse\Nse\NseActivityExclusionService::reasonForFilename(
                "INTEGRATED_FILING_BANKING_1697532_20072026080218_WEB.xml"
            );
            $general = \HalalPulse\Nse\NseActivityExclusionService::reasonForFilename(
                "INTEGRATED_FILING_INDAS_1697533_20072026080318_WEB.xml"
            );
            if ($banking === null || $general !== null) {
                fwrite(STDERR, "NSE activity exclusion rule failed." . PHP_EOL);
                exit(1);
            }
            echo "NSE activity exclusion rule passed." . PHP_EOL;
          '

      - name: Decode JSON fixtures and example policies
        run: |
          find config tests/fixtures -type f -name '*.json' -print0 \
            | sort -z \
            | xargs -0 -n1 php -r '
                $path = $argv[1];
                json_decode((string) file_get_contents($path), true, 512, JSON_THROW_ON_ERROR);
                echo "Valid JSON: {$path}" . PHP_EOL;
              '

      - name: Audit public repository safety
        run: php cron/audit-repository.php

      - name: Import schema and pending production migrations
        env:
          MYSQL_PWD: halalpulse_ci
        run: |
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/schema.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/migrations/010_nse_activity_exclusions.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/migrations/011_sharia_xbrl_candidates.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test < database/migrations/012_user_auth_version.sql
          table_count="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'halalpulse_test';")"
          status_type="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COLUMN_TYPE FROM information_schema.columns WHERE table_schema = 'halalpulse_test' AND table_name = 'nse_integrated_feed_items' AND column_name = 'status';")"
          candidate_table="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'halalpulse_test' AND table_name = 'sharia_input_candidates';")"
          xbrl_source_column="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'halalpulse_test' AND table_name = 'sharia_financial_inputs' AND column_name = 'source_integrated_item_id';")"
          auth_version_column="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'halalpulse_test' AND table_name = 'users' AND column_name = 'auth_version';")"
          test "$table_count" -eq 30
          test "$candidate_table" -eq 1
          test "$xbrl_source_column" -eq 1
          test "$auth_version_column" -eq 1
          case "$status_type" in *excluded*) ;; *) exit 1 ;; esac

      - name: Create isolated CI configuration
        run: |
          mkdir -p storage/logs storage/documents storage/xbrl storage/backups
          php -r '
            $config = require "config/config.example.php";
            $config["app"]["environment"] = "testing";
            $config["app"]["log_path"] = getcwd() . "/storage/logs/halalpulse.jsonl";
            $config["security"]["app_key"] = str_repeat("c", 64);
            $config["database"]["host"] = "127.0.0.1";
            $config["database"]["name"] = "halalpulse_test";
            $config["database"]["user"] = "halalpulse";
            $config["database"]["password"] = "halalpulse_ci";
            $config["documents"]["storage_path"] = getcwd() . "/storage/documents";
            $config["sources"]["nse_integrated_rss"]["storage_path"] = getcwd() . "/storage/xbrl";
            $config["backups"]["enabled"] = true;
            $config["backups"]["storage_path"] = getcwd() . "/storage/backups";
            $config["backups"]["encryption_passphrase"] = "ci-only-backup-passphrase-with-sufficient-length";
            $config["backups"]["mysqldump_binary"] = getcwd() . "/bin/mysqldump-no-tablespaces";
            $config["backups"]["tar_binary"] = "/usr/bin/tar";
            file_put_contents(
                "config/config.local.php",
                "<?php\n\ndeclare(strict_types=1);\n\nreturn " . var_export($config, true) . ";\n",
            );
          '
          chmod 600 config/config.local.php

      - name: Verify account-wide session revocation
        run: php tests/account-session-revocation-db.php

      - name: Verify idempotent backfill and evidence periods
        env:
          MYSQL_PWD: halalpulse_ci
        run: |
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test <<'SQL'
          INSERT INTO companies (exchange, symbol, company_name)
          VALUES ('NSE', 'BACKFILL', 'Backfill Test Limited');

          INSERT INTO filings (
            company_id, exchange, source_id, category, subject, announced_at,
            payload_hash, raw_payload, processing_status, processed_at
          ) VALUES (
            (SELECT id FROM companies WHERE exchange='NSE' AND symbol='BACKFILL'),
            'NSE', 'nse:backfill-test', 'Financial Results', 'Synthetic backfill result',
            '2026-07-21 10:00:00', REPEAT('a', 64), JSON_OBJECT('synthetic', TRUE),
            'processed', CURRENT_TIMESTAMP
          );

          INSERT INTO nse_integrated_feed_items (
            source_url, source_filename, company_name, description, filing_type,
            revision_note, published_at, item_hash, raw_item, status, filing_id,
            taxonomy_uri, first_discovered_at, last_seen_at, processed_at
          ) VALUES (
            'https://nsearchives.nseindia.com/corporate/backfill-test.xml',
            'INTEGRATED_FILING_INDAS_BACKFILL_WEB.xml', 'Backfill Test Limited',
            'Synthetic backfill item', 'original', '', '2026-07-21 10:00:00',
            REPEAT('b', 64), JSON_OBJECT('synthetic', TRUE), 'processed',
            (SELECT id FROM filings WHERE exchange='NSE' AND source_id='nse:backfill-test'),
            'https://www.sebi.gov.in/xbrl/synthetic.xsd',
            CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
          );

          INSERT INTO financial_results (
            integrated_item_id, filing_id, company_id, period_end,
            reporting_period_type, statement_scope, currency, total_income
          ) VALUES (
            (SELECT id FROM nse_integrated_feed_items WHERE source_filename='INTEGRATED_FILING_INDAS_BACKFILL_WEB.xml'),
            (SELECT id FROM filings WHERE exchange='NSE' AND source_id='nse:backfill-test'),
            (SELECT id FROM companies WHERE exchange='NSE' AND symbol='BACKFILL'),
            '2026-06-30', 'quarterly', 'standalone', 'INR', 123456789
          );

          INSERT INTO xbrl_facts (
            integrated_item_id, fact_name, context_ref, unit_ref,
            decimals_value, fact_value, occurrence
          ) VALUES (
            (SELECT id FROM nse_integrated_feed_items WHERE source_filename='INTEGRATED_FILING_INDAS_BACKFILL_WEB.xml'),
            'Income', 'OneD', 'INR', '0', '123456789', 1
          );
          SQL
          php cron/backfill-sharia-candidates.php --limit=10
          php cron/backfill-sharia-candidates.php --limit=10
          candidate_count="$(mysql --protocol=TCP -N -B -h 127.0.0.1 -P 3306 -u halalpulse halalpulse_test -e "SELECT COUNT(*) FROM sharia_input_candidates WHERE source_fact_name='Income' AND candidate_value=123456789;")"
          test "$candidate_count" -eq 1
          php tests/sharia-evidence-readiness-db.php
          php tests/multibagger-evidence-readiness-db.php

      - name: Verify encrypted backup lifecycle
        run: |
          set -o pipefail
          php cron/create-backup.php | tee /tmp/halalpulse-backup.json
          php cron/check-backups.php --decrypt
          backup_path="$(php -r '$v=json_decode((string)file_get_contents("/tmp/halalpulse-backup.json"),true,512,JSON_THROW_ON_ERROR);echo $v["path"];')"
          rm -rf /tmp/halalpulse-restore-test
          php cron/extract-backup.php "$backup_path" /tmp/halalpulse-restore-test --confirm-isolated-extraction
          test -s /tmp/halalpulse-restore-test/database.sql.gz
          test -s /tmp/halalpulse-restore-test/private-files.tar.gz
          test -s /tmp/halalpulse-restore-test/manifest.json
          gzip -t /tmp/halalpulse-restore-test/database.sql.gz
          tar -tzf /tmp/halalpulse-restore-test/private-files.tar.gz >/dev/null

      - name: Run deployment health check
        run: php cron/healthcheck.php

      - name: Confirm ignored runtime output
        run: test -z "$(git status --short)"
